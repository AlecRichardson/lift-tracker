<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />

  <title>Lift Tracker</title>

  <meta name="theme-color" content="#1e1f22" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Lift Tracker" />

  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="stylesheet" href="style.css" />

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
  <div id="drawerOverlay" class="drawerOverlay hidden"></div>

  <!-- Drawer -->
  <aside id="drawer" class="drawer" aria-label="Main menu">
    <div class="drawer-header">
      <div>
        <h3>Menu</h3>
        <p id="drawerUser" class="drawerUser"></p>
      </div>
      <button id="closeDrawer" type="button" aria-label="Close menu">✕</button>
    </div>

    <div class="drawerSectionLabel">Workouts</div>
    <div id="workoutNavList" class="workoutNavList"></div>

    <hr />

    <button id="navProgress" type="button" class="drawerNavBtn">Progress</button>
    <button id="navHistory" type="button" class="drawerNavBtn">History</button>
  </aside>

  <!-- Topbar -->
  <header class="topbar">
    <button id="hamburger" type="button" aria-label="Open menu">☰</button>
    <div class="topbarTitleWrap">
      <h2 id="pageTitle">Lift Tracker</h2>
      <p id="pageSubtitle"></p>
    </div>
  </header>

  <main class="appShell">
    <!-- Workout Page -->
    <section id="workoutPage" class="page">
      <div id="appMessage" class="appMessage hidden"></div>
      <div id="exerciseContainer"></div>

      <div class="saveDock">
        <button id="saveWorkout" type="button" class="primaryBtn">Save Workout</button>
        <div id="saveAnimation" class="saveAnimation hidden">💾 Saved!</div>
      </div>
    </section>

    <!-- Progress Page -->
    <section id="progressPage" class="page hidden">
      <div class="pageHeader">
        <h3>Progress</h3>
        <p>
          Track strength with better metrics than average weight alone.
        </p>
      </div>

      <label class="fieldLabel" for="exerciseSelect">Exercise</label>
      <select id="exerciseSelect"></select>

      <label class="fieldLabel" for="metricSelect">Metric</label>
      <select id="metricSelect">
        <option value="est1rm">Estimated 1RM</option>
        <option value="volume">Total Volume</option>
        <option value="topWeight">Top Working Weight</option>
        <option value="bestSetVolume">Best Set Volume</option>
        <option value="avgWeight">Average Weight</option>
      </select>

      <div class="chartCard">
        <canvas id="chart"></canvas>
      </div>
    </section>

    <!-- History Page -->
    <section id="historyPage" class="page hidden">
      <div class="pageHeader">
        <h3>Workout History</h3>
        <p>Tap a workout to expand. Swipe left to delete.</p>
      </div>

      <div id="historyList"></div>
    </section>
  </main>

  <script src="workouts.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
